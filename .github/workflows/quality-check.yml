# Quality Check
#
# This workflow runs on every Pull Request to verify code quality.
# It includes linting, type checking, testing, and building.
# Only when all checks pass can a PR be merged.

name: Quality Check

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Type Check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  iframe-browser-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Install Chromium
        run: pnpm --filter @nexus-js/iframe exec playwright install --with-deps chromium

      - name: Build iframe browser test artifacts
        run: pnpm --filter @nexus-js/iframe... build

      - name: Run iframe browser tests
        run: pnpm --filter @nexus-js/iframe test:browser
