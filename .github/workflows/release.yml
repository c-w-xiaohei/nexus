# Release
#
# This workflow runs on every push to main after a PR is merged.
# It uses changesets to create or update a version PR when release notes exist.
# Publishing should happen only from an intentional versioned release path.

name: Release

on:
  push:
    branches:
      - main

# Grant necessary permissions for GITHUB_TOKEN so changesets/action can push
permissions:
  contents: write
  pull-requests: write

# Prevent concurrent releases to avoid race conditions
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # We need full history to calculate correct version bumps
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "pnpm"
          # Configure npm registry for publishing
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install

      - name: Build Packages
        run: pnpm build

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        env:
          # Use the bot token so release PRs can be created and updated consistently.
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
